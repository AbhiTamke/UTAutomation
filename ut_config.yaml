tool:
  name: UTAutomation
  version: 1

project:
  name: VectorCASTProject
  author: AutoGenerated

defaults:
  unit_name_strategy: source_stem
  environment_name_pattern: "{unit}_ENV"
  output_file_pattern: "{unit}.tst"

generation:
  mode: skeleton
  test_naming_pattern: "TC_{function}_UT_{index:03d}"
  max_tests_per_function: 20

vectorcast:
  script_features:
    - C_DIRECT_ARRAY_INDEXING
    - CPP_CLASS_OBJECT_REVISION
    - MULTIPLE_UUT_SUPPORT
    - REMOVED_CL_PREFIX
    - MIXED_CASE_NAMES
    - STATIC_HEADER_FUNCS_IN_UUTS
    - VCAST_MAIN_NOT_RENAMED

metadata:
  default_status: In Review
  default_priority: High
  default_asil:
    - Statement Coverage
    - Branch Coverage
    - MC/DC Coverage
    - control flow verification
    - visual inspection

traceability:
  missing_review_id: TBD
  missing_guid: TBD

rules:
  enable_project_rules: false
  enable_expected_from_mapping: false

units: {}
